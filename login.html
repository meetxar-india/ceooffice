<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in · CEO Office</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
  :root{--ink:#0B1F3A;--panel:#12294B;--line:#27406b;--paper:#EDF1F7;--muted:#9DB0CC;--accent:#F0841F;--red:#E25555}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--ink);color:var(--paper);font-family:Inter,system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .box{width:100%;max-width:360px}
  .logoslot{font-family:"Space Grotesk";font-weight:700;font-size:13px;letter-spacing:.5px;color:var(--muted);margin-bottom:18px}
  .logoslot b{color:var(--paper)} .logoslot .bb{color:#5BA8FF}
  h1{font-family:"Space Grotesk";font-size:22px;margin-bottom:4px}
  .sub{color:var(--muted);font-size:13px;font-family:"JetBrains Mono";margin-bottom:22px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px}
  label{display:block;font-size:11px;color:var(--muted);font-family:"JetBrains Mono";text-transform:uppercase;letter-spacing:.5px;margin:0 0 5px}
  input{width:100%;background:var(--ink);border:1px solid var(--line);border-radius:8px;color:var(--paper);padding:11px 12px;font-size:14px;margin-bottom:14px}
  button{width:100%;font-weight:600;font-size:14px;cursor:pointer;border:none;border-radius:8px;padding:12px;color:#fff;background:var(--accent)}
  .err{color:var(--red);font-size:13px;min-height:18px;margin-bottom:10px}
</style>
</head>
<body>
<div class="box">
  <div class="logoslot"><b>RMX</b> &nbsp;|&nbsp; <span class="bb">BluBird</span></div>
  <h1>CEO Office</h1>
  <div class="sub">COMMAND CENTER</div>
  <div class="card">
    <div class="err" id="err"></div>
    <label>Username</label>
    <input id="u" autocomplete="username" />
    <label>Password</label>
    <input id="p" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')go()" />
    <button onclick="go()">Sign in</button>
  </div>
</div>
<script>
async function go(){
  const err = document.getElementById("err"); err.textContent="";
  const r = await fetch("/api/login",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:document.getElementById("u").value,password:document.getElementById("p").value})});
  if(r.ok){ location.href="/"; } else { const d=await r.json(); err.textContent=d.error||"Sign in failed"; }
}
// already signed in? skip
fetch("/api/me").then(r=>{ if(r.ok) location.href="/"; });
</script>
</body>
</html>
